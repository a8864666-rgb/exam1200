<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會考英文 1200 單字例句挑戰</title>
    <style>
        :root { --primary: #2ecc71; --wrong: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 600px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; font-size: 1.6rem; margin-bottom: 25px; }
        #login-screen { text-align: center; padding: 30px 0; }
        input { padding: 15px; width: 80%; border: 2px solid #ddd; border-radius: 12px; font-size: 1.1rem; margin-bottom: 20px; outline: none; }
        select { padding: 12px; width: 88%; border-radius: 12px; border: 2px solid #ddd; font-size: 1rem; margin-bottom: 20px; }
        button.main-btn { padding: 15px 40px; background: #3498db; color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 1.1rem; transition: 0.3s; width: 88%; }
        button.main-btn:hover { background: #2980b9; transform: translateY(-2px); }
        #game-screen { display: none; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; color: #7f8c8d; font-weight: bold; }
        .progress-bar { height: 12px; background: #eee; border-radius: 6px; overflow: hidden; margin-bottom: 25px; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        #sentence { font-size: 1.35rem; line-height: 1.6; color: #2c3e50; margin-bottom: 25px; padding: 20px; border-radius: 15px; background: #f0f7fd; position: relative; border-left: 6px solid #3498db; white-space: pre-wrap; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt-btn { padding: 18px 10px; border: 2px solid #eee; border-radius: 12px; background: white; cursor: pointer; font-size: 1.15rem; transition: 0.2s; font-weight: 500; }
        .opt-btn:hover { border-color: #3498db; background: #f7fbff; color: #3498db; }
        #feedback { text-align: center; font-weight: bold; margin-top: 20px; font-size: 1.2rem; min-height: 30px; }
        #hint-box { margin-top: 15px; font-size: 1rem; color: #d35400; background: #fff3e0; padding: 15px; border-radius: 10px; display: none; line-height: 1.5; }
        .wrong-list { margin-top: 40px; border-top: 2px dashed #ddd; padding-top: 25px; }
        .wrong-item { display: flex; justify-content: space-between; color: var(--wrong); padding: 8px 0; border-bottom: 1px solid #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <h1>會考 1200 單字例句實戰 ⚡</h1>
    <div id="login-screen">
        <input type="text" id="userName" placeholder="請輸入姓名/座號">
        <select id="levelSelect">
            <option value="1">Level 1 (單字 001-100)</option>
            <option value="2">Level 2 (單字 101-200)</option>
            <option value="3">Level 3 (單字 201-300)</option>
            <option value="4">Level 4 (單字 301-400)</option>
            <option value="5">Level 5 (單字 401-500)</option>
            <option value="6">Level 6 (單字 501-600)</option>
            <option value="7">Level 7 (單字 601-700)</option>
            <option value="8">Level 8 (單字 701-800)</option>
            <option value="9">Level 9 (單字 801-900)</option>
            <option value="10">Level 10 (單字 901-1000)</option>
            <option value="11">Level 11 (單字 1001-1100)</option>
            <option value="12">Level 12 (單字 1101-1200)</option>
        </select>
        <button class="main-btn" onclick="startGame()">開始練習</button>
    </div>

    <div id="game-screen">
        <div class="stats">
            <span id="display-name"></span>
            <span id="score-stats">正確率: 0/0</span>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div class="question-box">
            <div id="sentence">載入中...</div>
            <div id="hint-box">💡 老師提示：<span id="hint-text"></span></div>
            <div class="options-grid" id="options"></div>
        </div>
        <div id="feedback"></div>
        <div class="wrong-list">
            <h3 style="font-size: 1.1rem; color: #c0392b;">🔴 我的錯題排行榜</h3>
            <div id="wrong-items-container"></div>
        </div>
        <button onclick="location.reload()" style="margin-top:30px; background:#bdc3c7; border:none; padding:10px; border-radius:8px; width:100%; cursor:pointer;">返回首頁</button>
    </div>
</div>

<script>
const examData = {
    1: [
        { q: "Look at the picture. The girl is drawing two ________ on the wall.", o: ["circles", "lines", "points", "squares"], a: "squares", h: "看圖：牆上的圖案有四個邊且等長，是什麼形狀？" },
        { q: "Look at the picture. A bee is ________ on the rose.", o: ["landing", "lying", "parking", "surfing"], a: "landing", h: "看圖：蜜蜂正要『降落』在花朵上。" },
        { q: "It is hard for me to ________ that Mark is already 40. He looks like a student.", o: ["believe", "forget", "hope", "notice"], a: "believe", h: "外表年輕得像學生，所以讓人很難『相信』實際年齡。" },
        { q: "The paint on the wall is not as ________ as it was ten years ago. It has changed from white to gray.", o: ["bright", "heavy", "sure", "young"], a: "bright", h: "白色變成了灰色，代表不像以前那麼『明亮』。" },
        { q: "I told you this road went the wrong way. Now we have to ________ and take another road.", o: ["go ahead", "move away", "pass by", "turn back"], a: "turn back", h: "走錯路了，所以必須『往回轉』(turn back)。" },
        { q: "The last five years have not been ________ to Jennie. Her face is covered with lines and she looks much older.", o: ["kind", "special", "real", "enough"], a: "kind", h: "歲月讓她看起來老了很多，代表對她不『仁慈』(kind)。" },
        { q: "David forgot to bring money with him, so I ________ him NT$60 to pay for his lunch.", o: ["borrowed", "lent", "ordered", "spent"], a: "lent", h: "我是拿錢給他的人，所以是『借出』(lent)。" },
        { q: "It's raining ________. I think you should stay here until the rain stops.", o: ["politely", "heavily", "clearly", "easily"], a: "heavily", h: "形容雨下得『很大』，要用 heavily。" },
        { q: "This restaurant is ________ for its chicken soup. Many people come to eat it.", o: ["crazy", "delicious", "famous", "sharp"], a: "famous", h: "很多人慕名而來，是因為這間店很『有名』(famous)。" },
        { q: "Some songs are forgotten quickly. A really good song can pass the test of ________ and be remembered for years.", o: ["knowledge", "sound", "time", "weather"], a: "time", h: "能被記得很多年，代表通過了『時間』(time)的考驗。" },
        { q: "Helen: Can you turn off the TV? I can't study with the ________.\nTroy: No problem.", o: ["noise", "heat", "power", "light"], a: "noise", h: "電視發出的聲音干擾讀書，稱作『噪音』(noise)。" },
        { q: "I have to catch the bus right now, ________ I'll miss my brother's birthday party.", o: ["and", "because", "or", "until"], a: "or", h: "現在要去趕公車，『否則』(or)會錯過派對。" },
        { q: "Oliver ________ with joy when he saw his favorite band on the stage. He kept saying, 'I love you guys!'", o: ["waited", "shouted", "listened", "agreed"], a: "shouted", h: "高興到大喊『我愛你們』，代表他在『尖叫/喊叫』(shouted)。" },
        { q: "Ms. Lee is a(n) ________ businesswoman. She gave me back the wallet I left in her shop last week.", o: ["famous", "honest", "important", "smart"], a: "honest", h: "撿到錢包還給主人，代表她很『誠實』(honest)。" },
        { q: "Lexie ________ reading maps. Even with a map, she still cannot find her way in a foreign city.", o: ["is careful about", "is good at", "has fun", "has trouble"], a: "has trouble", h: "有地圖還找不到路，代表她在讀地圖上有『困難』(has trouble)。" },
        { q: "More and more cows on this farm are getting sick. The problem is so ________ that the farm will be closed.", o: ["heavy", "popular", "serious", "strong"], a: "serious", h: "嚴重到要關閉農場，代表問題很『嚴重』(serious)。" },
        { q: "I think the road ends here; it won't go any ________. Shouldn't we turn back?", o: ["closer", "farther", "faster", "longer"], a: "farther", h: "路到盡頭了，不會再延伸更『遠』(farther)。" },
        { q: "Jogging is the only exercise I enjoy. I find ________ other kinds of exercise boring.", o: ["all", "few", "many", "some"], a: "many", h: "只喜歡慢跑，代表覺得『許多』(many)其他運動很無聊。" },
        { q: "Smart Head, one of the hottest TV programs, ________ people free plane tickets if they answer all questions correctly.", o: ["have given", "gives", "giving", "to give"], a: "gives", h: "電視節目固定會『給予』獎勵，這題考單數主詞搭配動詞。" },
        { q: "Wait for me! You are walking too ________. I can't keep up with you.", o: ["fast", "slowly", "quietly", "hard"], a: "fast", h: "追不上對方，是因為對方走太『快』(fast)。" },
        { q: "The soup is too ________. Please add some water into it.", o: ["salty", "sweet", "fresh", "cold"], a: "salty", h: "要加水稀釋，通常是因為湯太『鹹』(salty)。" },
        { q: "My father is a ________. He drives a big truck every day to deliver goods.", o: ["driver", "doctor", "farmer", "waiter"], a: "driver", h: "職業是開大卡車的人，就是『司機』(driver)。" },
        { q: "The movie was so ________ that I cried at the end. I really felt sorry for the boy.", o: ["sad", "funny", "boring", "short"], a: "sad", h: "會讓人落淚的電影通常很『傷心』(sad)。" },
        { q: "My little brother is very ________. He likes to ask many questions like 'Why is the sky blue?'", o: ["curious", "lazy", "quiet", "shy"], a: "curious", h: "愛問問題的人很有『好奇心』(curious)。" },
        { q: "It is a ________ day. Let's go out and play basketball in the park.", o: ["sunny", "rainy", "cloudy", "windy"], a: "sunny", h: "適合去打球的天氣通常是『晴天』(sunny)。" },
        { q: "The box is too ________. I can't move it by myself. Could you help me?", o: ["heavy", "light", "small", "thin"], a: "heavy", h: "搬不動是因為東西太『重』(heavy)。" },
        { q: "I want to be a ________ in the future because I want to help sick people feel better.", o: ["doctor", "driver", "farmer", "singer"], a: "doctor", h: "想醫治病人的人，志向是當『醫生』(doctor)。" },
        { q: "Please ________ the door quietly. The baby has just fallen asleep.", o: ["close", "open", "break", "wash"], a: "close", h: "為了不吵醒寶寶，要輕輕地『關』(close)門。" },
        { q: "The dress is very ________. I don't have enough money to buy it now.", o: ["expensive", "cheap", "useful", "simple"], a: "expensive", h: "沒錢買代表東西很『貴』(expensive)。" },
        { q: "I usually have ________ at 7:00 in the morning before I go to school.", o: ["breakfast", "lunch", "dinner", "snack"], a: "breakfast", h: "早上七點吃的那一餐是『早餐』(breakfast)。" },
        { q: "The knife is very ________. Be careful when you use it to cut the fruit.", o: ["sharp", "heavy", "bright", "slow"], a: "sharp", h: "要小心使用，是因為刀子很『鋒利』(sharp)。" },
        { q: "The coffee is too ________ for me. I need to add some sugar and milk.", o: ["bitter", "sweet", "salty", "fresh"], a: "bitter", h: "需要加糖是因為咖啡太『苦』(bitter)。" },
        { q: "I'm so ________. I can eat two whole large pizzas by myself right now.", o: ["hungry", "thirsty", "tired", "bored"], a: "hungry", h: "能吃下很多東西代表非常『餓』(hungry)。" },
        { q: "The music is too ________. Can you turn it down? I'm talking on the phone.", o: ["loud", "quiet", "sweet", "soft"], a: "loud", h: "要調小聲代表音樂太『大聲』(loud)。" },
        { q: "My sister is a ________. She works in a hospital and helps the doctors.", o: ["nurse", "teacher", "cook", "driver"], a: "nurse", h: "在醫院協助醫生的人是『護理師』(nurse)。" },
        { q: "It's ________ outside. You should put on your heavy coat and gloves.", o: ["cold", "hot", "sunny", "warm"], a: "cold", h: "要穿大衣戴手套是因為外面很『冷』(cold)。" },
        { q: "I have a ________. I need to see a dentist and have my tooth checked.", o: ["toothache", "headache", "fever", "cough"], a: "toothache", h: "看牙醫(dentist)是因為『牙痛』(toothache)。" },
        { q: "The sun is very ________. It gives us light and keeps us warm.", o: ["bright", "dark", "cold", "small"], a: "bright", h: "太陽提供光線，所以很『明亮』(bright)。" },
        { q: "My mom bought some ________ and vegetables from the market for dinner.", o: ["fruit", "meat", "bread", "milk"], a: "fruit", h: "通常與蔬菜(vegetables)並稱的是『水果』(fruit)。" },
        { q: "The ________ of the house is too high. We don't have enough money for it.", o: ["price", "color", "size", "height"], a: "price", h: "買不起是因為『價格』(price)太高。" },
        { q: "I feel ________ because my best friend moved to another city last week.", o: ["lonely", "happy", "lucky", "excited"], a: "lonely", h: "好朋友搬走了，會感到『孤單』(lonely)。" },
        { q: "The teacher is ________ with us because we didn't do our homework again.", o: ["angry", "happy", "proud", "kind"], a: "angry", h: "沒寫作業會讓老師很『生氣』(angry)。" },
        { q: "I need to ________ for the exam. It's very important for my future.", o: ["study", "play", "sleep", "dance"], a: "study", h: "為了重要的考試要『研讀』(study)。" },
        { q: "The ________ is very strong. I can't even open my eyes to see the road.", o: ["light", "wind", "sound", "rain"], a: "light", h: "強到張不開眼，通常是指『光線』(light)。" },
        { q: "The ________ is very delicious. I want another bowl, please.", o: ["soup", "water", "juice", "milk"], a: "soup", h: "裝在『碗』(bowl)裡的美味液體食物是『湯』(soup)。" },
        { q: "I ________ a lot of time playing computer games every weekend.", o: ["spend", "take", "cost", "save"], a: "spend", h: "人『花費』時間做某事用 spend。" },
        { q: "The ________ is very blue today. There are no clouds at all.", o: ["sky", "sea", "river", "lake"], a: "sky", h: "沒有雲且藍藍的是『天空』(sky)。" },
        { q: "I ________ my teeth twice a day—once in the morning and once at night.", o: ["brush", "wash", "clean", "cut"], a: "brush", h: "刷牙的固定動詞是『brush』。" },
        { q: "I ________ my father's car every Saturday morning to keep it clean.", o: ["wash", "brush", "clean", "cut"], a: "wash", h: "清洗汽車用『wash』。" },
        { q: "The ________ is very tall. It has 50 floors and many offices.", o: ["building", "house", "tree", "mountain"], a: "building", h: "有很多樓層的建築物是『大樓』(building)。" },
        { q: "I ________ a lot of books from the library to help with my report.", o: ["borrow", "lend", "save", "spend"], a: "borrow", h: "從圖書館『借入』書用 borrow。" },
        { q: "I ________ my room every weekend to keep it tidy and clean.", o: ["clean", "wash", "brush", "cut"], a: "clean", h: "打掃房間用『clean』。" },
        { q: "The ________ is very funny. It always makes me laugh a lot.", o: ["joke", "story", "news", "song"], a: "joke", h: "會讓人笑的是『笑話』(joke)。" },
        { q: "The ________ is very fast. It can take us to the airport in 20 minutes.", o: ["train", "bus", "bike", "car"], a: "train", h: "描述快速的公共運輸工具，通常指『火車/捷運』(train)。" },
        { q: "I ________ a lot of questions in class because I want to learn more.", o: ["ask", "answer", "give", "take"], a: "ask", h: "在課堂上『提問』(ask)。" },
        { q: "I'm very ________. Could I have a glass of cold water?", o: ["thirsty", "hungry", "tired", "sleepy"], a: "thirsty", h: "想喝水代表很『渴』(thirsty)。" },
        { q: "The classroom is very ________. Let's clean it before the teacher comes.", o: ["dirty", "clean", "bright", "large"], a: "dirty", h: "要清理是因為教室很『髒』(dirty)。" },
        { q: "I ________ my homework after dinner every day.", o: ["do", "make", "take", "give"], a: "do", h: "『做』功課固定用 do homework。" },
        { q: "The ________ is very fresh. Let's open the window to let it in.", o: ["air", "water", "food", "milk"], a: "air", h: "開窗是為了讓『空氣』(air)流通。" },
        { q: "I feel ________. I think I'll go to bed now.", o: ["sleepy", "hungry", "thirsty", "angry"], a: "sleepy", h: "想睡覺是因為感到『睏』(sleepy)。" },
        { q: "The ________ is very long. It takes two hours to cross it by car.", o: ["bridge", "road", "street", "river"], a: "bridge", h: "跨越兩端的長型建物是『橋』(bridge)。" },
        { q: "I like to ________ in the ocean during the hot summer.", o: ["swim", "run", "jump", "dance"], a: "swim", h: "夏天在海裡做的運動是『游泳』(swim)。" },
        { q: "The ________ is very beautiful. I want to buy it for my mother's birthday.", o: ["necklace", "shoe", "hat", "bag"], a: "necklace", h: "送給媽媽的精美首飾，通常指『項鍊』(necklace)。" },
        { q: "I ________ my sister's hand when we walk across the busy street.", o: ["hold", "take", "give", "keep"], a: "hold", h: "過馬路時會『牽/握』(hold)住手。" },
        { q: "The ________ is very loud. It woke me up at 6:00 this morning.", o: ["alarm", "light", "wind", "rain"], a: "alarm", h: "會吵醒人的定時裝置是『鬧鐘』(alarm)。" },
        { q: "The ________ is very cold today. I think it might snow later.", o: ["weather", "water", "food", "milk"], a: "weather", h: "冷到會下雪是指『天氣』(weather)。" },
        { q: "The night sky is ________. I can see millions of stars tonight.", o: ["beautiful", "ugly", "noisy", "dirty"], a: "beautiful", h: "滿天星斗是很『美』(beautiful)的。" },
        { q: "I ________ some money in the bank every month for my future trip.", o: ["save", "spend", "take", "give"], a: "save", h: "存錢用『save』。" },
        { q: "I ________ an email to my teacher to ask about the homework.", o: ["sent", "took", "made", "kept"], a: "sent", h: "寄送電郵用『send』(過去式為 sent)。" },
        { q: "The ________ is very long. It takes 10 hours to fly to the USA.", o: ["flight", "road", "trip", "train"], a: "flight", h: "飛到美國要花10小時的是『航班』(flight)。" },
        { q: "I ________ all the questions correctly and got a high grade.", o: ["answered", "asked", "gave", "take"], a: "answered", h: "拿到高分是因為『回答』(answered)正確。" },
        { q: "The ________ is very high. I need a ladder to paint it white.", o: ["wall", "floor", "door", "window"], a: "wall", h: "需要梯子才刷得到的是『牆壁』(wall)。" },
        { q: "The ________ is very beautiful. I want to take a photo of the red sun.", o: ["sunset", "sound", "smell", "taste"], a: "sunset", h: "美麗的紅太陽下山景象是『日落』(sunset)。" },
        { q: "I want to ________ a picture of my dog for my father's birthday.", o: ["paint", "read", "speak", "listen"], a: "paint", h: "『畫』一幅畫用 paint。" },
        { q: "The ________ is very strong. I can't break it with my bare hands.", o: ["lock", "paper", "glass", "wood"], a: "lock", h: "堅固到弄不壞的門上裝置是『鎖』(lock)。" },
        { q: "I feel ________. Can I have some snacks before dinner?", o: ["hungry", "thirsty", "tired", "sleepy"], a: "hungry", h: "餐前想吃零食是因為感到『餓』(hungry)。" },
        { q: "The ________ is very smart. It can help me find the best route home.", o: ["app", "chair", "table", "bed"], a: "app", h: "會導航的聰明程式是『APP』。" },
        { q: "I ________ a lot of fun at the beach with my friends yesterday.", o: ["had", "did", "made", "took"], a: "had", h: "玩得開心用『had』a lot of fun。" },
        { q: "The ________ is very hot. Be careful when you use it to iron your clothes.", o: ["iron", "table", "chair", "bed"], a: "iron", h: "用來燙衣服且很燙的工具是『熨斗』(iron)。" },
        { q: "The ________ is very loud. It's coming from the construction site.", o: ["noise", "light", "wind", "rain"], a: "noise", h: "工地傳來的巨大聲響是『噪音』(noise)。" },
        { q: "I ________ my friend a funny story about my pet cat.", o: ["told", "said", "spoke", "talked"], a: "told", h: "講故事用『tell』(過去式為 told)。" },
        { q: "The ________ is very nice today. Let's go for a walk in the park.", o: ["weather", "water", "food", "milk"], a: "weather", h: "天氣好適合散步。" },
        { q: "I ________ many new things from the history class today.", o: ["learned", "taught", "gave", "take"], a: "learned", h: "學到新知識用『learn』(過去式為 learned)。" },
        { q: "I ________ exercise every morning to stay healthy and fit.", o: ["do", "make", "take", "give"], a: "do", h: "做運動用『do』exercise。" },
        { q: "The ________ is very smart. It can help me solve math problems.", o: ["calculator", "cat", "bird", "fish"], a: "calculator", h: "會解數學題的聰明機器是『計算機』(calculator)。" },
        { q: "The ________ is very wide. Many large boats are on it.", o: ["river", "sky", "road", "park"], a: "river", h: "有很多船在上面的寬廣水域是『河流』(river)。" },
        { q: "The ________ is very interesting. I have read it three times.", o: ["book", "story", "news", "song"], a: "book", h: "讀了三遍的東西是『書』(book)。" },
        { q: "I ________ my bike once a week to keep it clean and shiny.", o: ["wash", "brush", "clean", "cut"], a: "wash", h: "洗腳踏車用『wash』。" },
        { q: "The ________ is very bright. It's full of stars tonight.", o: ["night", "day", "sky", "sea"], a: "night", h: "繁星點點的是『夜晚』(night)。" },
        { q: "I ________ dinner with my family every evening.", o: ["eat", "drink", "take", "give"], a: "eat", h: "吃晚餐用『eat』。" },
        { q: "I ________ my room every Saturday morning.", o: ["clean", "wash", "brush", "cut"], a: "clean", h: "打掃房間用『clean』。" },
        { q: "The ________ is very funny. It always makes me laugh.", o: ["joke", "story", "news", "song"], a: "joke", h: "會讓人笑的是『笑話』(joke)。" },
        { q: "I ________ money to buy a new computer for my study.", o: ["save", "spend", "take", "give"], a: "save", h: "為了買東西而『存錢』用 save。" },
        { q: "I ________ a gift to my mother on Mother's Day.", o: ["give", "take", "make", "keep"], a: "give", h: "送禮物用『give』。" },
        { q: "The ________ is very cold. You should wear a sweater.", o: ["weather", "water", "food", "milk"], a: "weather", h: "天氣冷要穿毛衣。" },
        { q: "I ________ a dream about flying last night. It was cool!", o: ["had", "did", "made", "took"], a: "had", h: "做夢的動詞固定用『had』a dream。" },
        { q: "The ________ is very green. Many people are playing soccer there.", o: ["grass", "sky", "sea", "road"], a: "grass", h: "踢足球的綠色地面是『草地』(grass)。" },
        { q: "I ________ my best to win the game for my team.", o: ["did", "made", "took", "gave"], a: "did", h: "盡力而為用『did』one's best。" },
        { q: "The ________ is very smart. It can follow its owner's orders.", o: ["dog", "cat", "bird", "fish"], a: "dog", h: "會聽從主人指令的聰明動物通常指『狗』(dog)。" },
        { q: "The ________ is very wide. I can't see the other side of it.", o: ["ocean", "sky", "road", "park"], a: "ocean", h: "寬廣到看不見對岸的是『海洋』(ocean)。" }
    ],
};


let currentUser = "";
let currentLevel = 1;
let currentIndex = 0;
let stats = { correct: 0, total: 0 };
let mistakes = {};

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startGame() {
    currentUser = document.getElementById('userName').value.trim();
    currentLevel = parseInt(document.getElementById('levelSelect').value);
    if (!currentUser) { alert("請輸入姓名或座號後開始"); return; }
    
    if (!examData[currentLevel] || examData[currentLevel].length === 0) {
        alert("此關卡資料載入中，請稍後");
        return;
    }

    const saved = localStorage.getItem(`examB_${currentUser}_L${currentLevel}`);
    if (saved) {
        const d = JSON.parse(saved);
        stats = d.stats || { correct: 0, total: 0 };
        mistakes = d.mistakes || {};
    } else {
        stats = { correct: 0, total: 0 };
        mistakes = {};
    }

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    document.getElementById('display-name').innerText = `戰士：${currentUser} (Level ${currentLevel})`;
    
    nextQuestion();
    updateMistakesUI();
    updateStatsUI();
}

function nextQuestion() {
    const questions = examData[currentLevel];
    currentIndex = Math.floor(Math.random() * questions.length);
    const data = questions[currentIndex];
    
    document.getElementById('sentence').innerText = data.q;
    document.getElementById('feedback').innerText = "";
    document.getElementById('hint-box').style.display = 'none';
    
    const optsDiv = document.getElementById('options');
    optsDiv.innerHTML = "";
    const shuffledOptions = shuffle([...data.o]);
    
    shuffledOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = opt;
        btn.onclick = () => check(opt, data.a, data.h, data.q);
        optsDiv.appendChild(btn);
    });
}

function check(sel, ans, hint, sentence) {
    stats.total++;
    if (sel === ans) {
        stats.correct++;
        document.getElementById('feedback').innerHTML = "🟢 正確！太優秀了！";
        document.getElementById('feedback').style.color = "var(--primary)";
        speak(sentence.replace("________", ans));
        setTimeout(nextQuestion, 1200);
    } else {
        document.getElementById('feedback').innerHTML = "🔴 答錯了，再想一下！";
        document.getElementById('feedback').style.color = "var(--wrong)";
        document.getElementById('hint-text').innerText = hint;
        document.getElementById('hint-box').style.display = 'block';
        mistakes[ans] = (mistakes[ans] || 0) + 1;
        updateMistakesUI();
    }
    save();
    updateStatsUI();
}

function speak(text) {
    const m = new SpeechSynthesisUtterance(text);
    m.lang = 'en-US'; m.rate = 0.8;
    window.speechSynthesis.speak(m);
}

function save() {
    localStorage.setItem(`examB_${currentUser}_L${currentLevel}`, JSON.stringify({stats, mistakes}));
}

function updateStatsUI() {
    const totalInLevel = examData[currentLevel].length;
    document.getElementById('score-stats').innerText = `進度: ${stats.correct}/${totalInLevel}`;
    const p = (stats.correct / totalInLevel) * 100;
    document.getElementById('progress-fill').style.width = Math.min(p, 100) + "%";
}

function updateMistakesUI() {
    const c = document.getElementById('wrong-items-container');
    c.innerHTML = "";
    Object.entries(mistakes).sort((a,b)=>b[1]-a[1]).forEach(([w, n]) => {
        const d = document.createElement('div');
        d.className = 'wrong-item';
        d.innerHTML = `<span>${w}</span><span>${n} 次</span>`;
        c.appendChild(d);
    });
}
</script>
