<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

        :root { --primary: #2ecc71; --wrong: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 600px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; font-size: 1.6rem; margin-bottom: 25px; }

        select { padding: 12px; width: 88%; border-radius: 12px; border: 2px solid #ddd; font-size: 1rem; margin-bottom: 20px; }
        button.main-btn { padding: 15px 40px; background: #3498db; color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 1.1rem; transition: 0.3s; width: 88%; }
        button.main-btn:hover { background: #2980b9; transform: translateY(-2px); }
        #game-screen { display: none; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; color: #7f8c8d; font-weight: bold; }
        .progress-bar { height: 12px; background: #eee; border-radius: 6px; overflow: hidden; margin-bottom: 25px; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        #sentence { font-size: 1.35rem; line-height: 1.6; color: #2c3e50; margin-bottom: 25px; padding: 20px; border-radius: 15px; background: #f0f7fd; position: relative; border-left: 6px solid #3498db; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt-btn { padding: 18px 10px; border: 2px solid #eee; border-radius: 12px; background: white; cursor: pointer; font-size: 1.15rem; transition: 0.2s; font-weight: 500; }
        .opt-btn:hover { border-color: #3498db; background: #f7fbff; color: #3498db; }
        #feedback { text-align: center; font-weight: bold; margin-top: 20px; font-size: 1.2rem; min-height: 30px; }
        #hint-box { margin-top: 15px; font-size: 1rem; color: #d35400; background: #fff3e0; padding: 15px; border-radius: 10px; display: none; line-height: 1.5; }
        .wrong-list { margin-top: 40px; border-top: 2px dashed #ddd; padding-top: 25px; }
        .wrong-item { display: flex; justify-content: space-between; color: var(--wrong); padding: 8px 0; border-bottom: 1px solid #f9f9f9; }
    </style>
</head>
<body>

        { q: "It is ________ to ignore someone when they are talking to you.", o: ["offensive", "dangerous", "selfish", "rude"], a: "offensive", h: "冒犯的/無禮的(offensive)。" },
        { q: "A: How ________ have you been working as a teacher?\nB: For over ten years.", o: ["long", "soon", "far", "often"], a: "long", h: "問時長。" },
        { q: "Look at the picture. A boy is ________ the old dog in the park.", o: ["comforting", "dropping", "breaking", "selling"], a: "comforting", h: "看圖題：正在『安慰』(comforting)狗。" },
        { q: "A: Why didn't you join the club?\nB: I wasn't ________ that they were accepting new members.", o: ["aware", "ordered", "scared", "dropped"], a: "aware", h: "沒意識到、『不知道』(aware)。" },
        { q: "The ________ of the new smartphone is very sleek and modern.", o: ["aesthetic", "pollution", "nature", "history"], a: "aesthetic", h: "美學的、『美觀的』(aesthetic)。" },
        { q: "I ________ to be a better person every day.", o: ["aspire", "made", "took", "gave"], a: "aspire", h: "渴望/追求(aspire)。" },
        { q: "A: Could you ________ me to the nearest bus stop?\nB: Sure, it's just around the corner.", o: ["guide", "forget", "happen", "appear"], a: "guide", h: "引導(guide)。" },
        { q: "The lake was so ________ in the early morning fog.", o: ["serene", "dark", "deep", "dirty"], a: "serene", h: "安詳寧靜的(serene)。" },
        { q: "I find it ________ to exercise regularly to maintain good health.", o: ["constructive", "boring", "scary", "useless"], a: "constructive", h: "建設性的/有益的(constructive)。" },
        { q: "A: Why are you talking so ________?\nB: I don't want the others to know our plan.", o: ["cautiously", "fast", "slowly", "hard"], a: "cautiously", h: "謹慎地(cautiously)。" },
        { q: "The perfume ________ very sweet and floral.", o: ["smells", "tastes", "looks", "feels"], a: "smells", h: "聞起來(smells)。" },
        { q: "I felt very ________ when I received the reward for my hard work.", o: ["honored", "afraid", "sorry", "tired"], a: "honored", h: "感到榮幸的(honored)。" },
        { q: "A: You look ________. Did you have a long day at work?\nB: Yes, I'm ready to go home and rest.", o: ["fatigued", "excited", "happy", "lucky"], a: "fatigued", h: "疲憊的(fatigued)。" },
        { q: "The ________ of the film was very dramatic and emotional.", o: ["climax", "beginning", "middle", "part"], a: "climax", h: "高潮(climax)。" },
        { q: "I ________ with delight when I saw the surprise party my friends threw for me.", o: ["beamed", "slept", "sat", "waited"], a: "beamed", h: "眉開眼笑(beamed)。" },
        { q: "The doctor suggested a regular ________ of my diet to improve my energy levels.", o: ["evaluation", "information", "experience", "environment"], a: "evaluation", h: "評估(evaluation)。" },
        { q: "A: How ________ will the new park be open to the public?\nB: Next month.", o: ["soon", "often", "long", "far"], a: "soon", h: "不久(soon)。" },
        { q: "The restaurant was ________ on a Friday night.", o: ["overflowing", "bright", "cool", "clean"], a: "overflowing", h: "人滿為患的(overflowing)。" },
        { q: "I felt ________ when I forgot my lines on stage.", o: ["humiliated", "excited", "proud", "lucky"], a: "humiliated", h: "感到丟臉的/羞辱的(humiliated)。" },
        { q: "A: Have you finished the project ________?\nB: Yes, it's already on the boss's desk.", o: ["already", "yet", "still", "ever"], a: "already", h: "已經(already)。" },
        { q: "The ________ of the water is rising due to the heavy rain.", o: ["level", "price", "color", "size"], a: "level", h: "水位(level)。" },
        { q: "I ________ a change in his attitude recently.", o: ["perceived", "saw", "felt", "smelt"], a: "perceived", h: "察覺/感覺到(perceived)。" },
        { q: "A: Is there ________ else you want to say?\nB: No, that's everything.", o: ["anything", "nothing", "everyone", "someone"], a: "anything", h: "任何事(anything)。" },
        { q: "The weather ________ says it will be a sunny day tomorrow.", o: ["forecast", "history", "nature", "pollution"], a: "forecast", h: "預報(forecast)。" },
        { q: "I ________ my friend for the wonderful gift.", o: ["thanked", "said", "spoke", "talked"], a: "thanked", h: "感謝(thanked)。" },
        { q: "Look at the picture. A girl is ________ the flowers in the garden.", o: ["watering", "washing", "buying", "selling"], a: "watering", h: "看圖題：澆水(watering)。" },
        { q: "A: Why are you so ________ today?\nB: I just got a letter from an old friend.", o: ["joyful", "nervous", "angry", "tired"], a: "joyful", h: "喜悅的(joyful)。" },
        { q: "The internet is so ________ that I can't even send an email.", o: ["unstable", "fast", "new", "expensive"], a: "unstable", h: "不穩定的(unstable)。" }
};

let currentUser = "";
let currentLevel = 1;
let currentIndex = 0;
let stats = { correct: 0, total: 0 };
let mistakes = {};

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startGame() {
    currentUser = document.getElementById('userName').value.trim();
    currentLevel = parseInt(document.getElementById('levelSelect').value);
    if (!currentUser) { alert("請輸入姓名後開始"); return; }
    
    const saved = localStorage.getItem(`examB_${currentUser}_L${currentLevel}`);
    if (saved) {
        const d = JSON.parse(saved);
        stats = d.stats || { correct: 0, total: 0 };
        mistakes = d.mistakes || {};
    }

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    document.getElementById('display-name').innerText = `戰士：${currentUser} (L${currentLevel})`;
    
    nextQuestion();
    updateMistakesUI();
    updateStatsUI();
}

function nextQuestion() {
    const questions = examData[currentLevel];
    if (!questions || questions.length === 0) {
        alert("此關卡暫無題目資料");
        location.reload();
        return;
    }
    currentIndex = Math.floor(Math.random() * questions.length);
    
    const data = questions[currentIndex];
    document.getElementById('sentence').innerText = data.q;
    document.getElementById('feedback').innerText = "";
    document.getElementById('hint-box').style.display = 'none';
    
    const optsDiv = document.getElementById('options');
    optsDiv.innerHTML = "";
    const shuffledOptions = shuffle([...data.o]); 
    
    shuffledOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = opt;
        btn.onclick = () => check(opt, data.a, data.h, data.q);
        optsDiv.appendChild(btn);
    });
}

function check(sel, ans, hint, sentence) {
    stats.total++;
    if (sel === ans) {
        stats.correct++;
        document.getElementById('feedback').innerHTML = "🟢 正確！太優秀了！";
        document.getElementById('feedback').style.color = "var(--primary)";
        speak(sentence.replace("________", ans));
        setTimeout(nextQuestion, 1500);
    } else {
        document.getElementById('feedback').innerHTML = "🔴 答錯了，再想一下！";
        document.getElementById('feedback').style.color = "var(--wrong)";
        document.getElementById('hint-text').innerText = hint;
        document.getElementById('hint-box').style.display = 'block';
        mistakes[ans] = (mistakes[ans] || 0) + 1;
        updateMistakesUI();
    }
    save();
    updateStatsUI();
}

function speak(text) {
    const m = new SpeechSynthesisUtterance(text);
    m.lang = 'en-US'; m.rate = 0.8;
    window.speechSynthesis.speak(m);
}

function save() {
    localStorage.setItem(`examB_${currentUser}_L${currentLevel}`, JSON.stringify({stats, mistakes}));
}

function updateStatsUI() {
    const totalInLevel = examData[currentLevel].length;
    document.getElementById('score-stats').innerText = `正確率: ${stats.correct}/${stats.total}`;
    const p = (stats.correct / totalInLevel) * 100;
    document.getElementById('progress-fill').style.width = Math.min(p, 100) + "%";
}

function updateMistakesUI() {
    const c = document.getElementById('wrong-items-container');
    c.innerHTML = "";
    Object.entries(mistakes).sort((a,b)=>b[1]-a[1]).forEach(([w, n]) => {
        const d = document.createElement('div');
        d.className = 'wrong-item';
        d.innerHTML = `<span>${w}</span><span>${n} 次</span>`;
        c.appendChild(d);
    });
}
</script>
