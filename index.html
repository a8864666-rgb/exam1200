let currentUser = "";

let currentIndex = 0;
let stats = { correct: 0, total: 0 };
let mistakes = {};

// 洗牌函數：隨機打亂數組順序
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startGame() {
    currentUser = document.getElementById('userName').value.trim();
    currentLevel = parseInt(document.getElementById('levelSelect').value);
    if (!currentUser) { alert("請輸入姓名後開始"); return; }
    
    const saved = localStorage.getItem(`examB_${currentUser}_L${currentLevel}`);
    if (saved) {
        const d = JSON.parse(saved);
        stats = d.stats || { correct: 0, total: 0 };
        mistakes = d.mistakes || {};
    }

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    document.getElementById('display-name').innerText = `戰士：${currentUser} (L${currentLevel})`;
    
    nextQuestion();
    updateMistakesUI();
    updateStatsUI();
}

function nextQuestion() {
    const questions = examData[currentLevel];
    if (!questions) return;
    currentIndex = Math.floor(Math.random() * questions.length);
    
    const data = questions[currentIndex];
    document.getElementById('sentence').innerText = data.q;
    document.getElementById('feedback').innerText = "";
    document.getElementById('hint-box').style.display = 'none';
    
    const optsDiv = document.getElementById('options');
    optsDiv.innerHTML = "";
    
    // --- 關鍵修改：先將選項複製一份並洗牌 ---
    const shuffledOptions = shuffle([...data.o]); 
    
    shuffledOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = opt;
        btn.onclick = () => check(opt, data.a, data.h, data.q);
        optsDiv.appendChild(btn);
    });
}

function check(sel, ans, hint, sentence) {
    stats.total++;
    if (sel === ans) {
        stats.correct++;
        document.getElementById('feedback').innerHTML = "🟢 正確！太優秀了！";
        document.getElementById('feedback').style.color = "var(--primary)";
        speak(sentence.replace("________", ans));
        setTimeout(nextQuestion, 1500);
    } else {
        document.getElementById('feedback').innerHTML = "🔴 答錯了，再想一下！";
        document.getElementById('feedback').style.color = "var(--wrong)";
        document.getElementById('hint-text').innerText = hint;
        document.getElementById('hint-box').style.display = 'block';
        mistakes[ans] = (mistakes[ans] || 0) + 1;
        updateMistakesUI();
    }
    save();
    updateStatsUI();
}

function speak(text) {
    const m = new SpeechSynthesisUtterance(text);
    m.lang = 'en-US'; m.rate = 0.8;
    window.speechSynthesis.speak(m);
}

function save() {
    localStorage.setItem(`examB_${currentUser}_L${currentLevel}`, JSON.stringify({stats, mistakes}));
}

function updateStatsUI() {
    document.getElementById('score-stats').innerText = `正確率: ${stats.correct}/${stats.total}`;
    const p = (stats.correct / examData[currentLevel].length) * 100;
    document.getElementById('progress-fill').style.width = Math.min(p, 100) + "%";
}

function updateMistakesUI() {
    const c = document.getElementById('wrong-items-container');
    c.innerHTML = "";
    Object.entries(mistakes).sort((a,b)=>b[1]-a[1]).forEach(([w, n]) => {
        const d = document.createElement('div');
        d.className = 'wrong-item';
        d.innerHTML = `<span>${w}</span><span>${n} 次</span>`;
        c.appendChild(d);
    });
}
